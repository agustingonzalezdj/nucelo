// ─── Calculadora de macros ───
function CalculadoraMacros({ onBack }) {
  const [peso, setPeso] = React.useState(82);
  const [altura, setAltura] = React.useState(178);
  const [edad, setEdad] = React.useState(31);
  const [obj, setObj] = React.useState('mantenimiento');

  // Mifflin-St Jeor
  const tmb = 10 * peso + 6.25 * altura - 5 * edad + 5;
  const tdee = Math.round(tmb * 1.55);
  const ajuste = obj === 'definicion' ? -400 : obj === 'volumen' ? +300 : 0;
  const cal = tdee + ajuste;
  const prot = Math.round(peso * 2.2);
  const grasa = Math.round((cal * 0.25) / 9);
  const carb = Math.round((cal - prot * 4 - grasa * 9) / 4);

  return (
    <div style={{ paddingTop: 8, paddingBottom: 130 }}>
      <div style={{ padding: '8px 22px 12px' }}>
        <button onClick={onBack} style={{
          background: 'none', border: 'none', color: PALETTE.text2, cursor: 'pointer',
          fontSize: 13, padding: 0, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 4,
        }}>
          <Icon name="chev" size={14} sw={2} color={PALETTE.text2} style={{ transform: 'rotate(180deg)' }}/>
          Atrás
        </button>
      </div>
      <ScreenHeader title="Calculadora" sub="Tu objetivo de macros del día"/>

      <div style={{ padding: '0 16px' }}>
        <div style={{ ...cardCss, marginBottom: 14, padding: 0 }}>
          {[['Peso (kg)', peso, setPeso, 50, 130], ['Altura (cm)', altura, setAltura, 140, 220], ['Edad', edad, setEdad, 16, 80]].map(([l, v, set, min, max], i) => (
            <div key={l} style={{
              display: 'flex', alignItems: 'center', padding: '14px 18px', gap: 12,
              borderTop: i > 0 ? `0.5px solid ${PALETTE.border}` : 'none',
            }}>
              <div style={{ flex: 1, fontSize: 14, color: PALETTE.text, fontWeight: 500 }}>{l}</div>
              <button onClick={() => set(Math.max(min, v - 1))} style={{
                width: 28, height: 28, borderRadius: 14, background: PALETTE.surfaceStrong,
                border: 'none', color: PALETTE.text, cursor: 'pointer', fontSize: 16,
              }}>−</button>
              <div style={{ minWidth: 40, textAlign: 'center', fontSize: 16, fontWeight: 600,
                color: PALETTE.text, fontVariantNumeric: 'tabular-nums' }}>{v}</div>
              <button onClick={() => set(Math.min(max, v + 1))} style={{
                width: 28, height: 28, borderRadius: 14, background: PALETTE.surfaceStrong,
                border: 'none', color: PALETTE.text, cursor: 'pointer', fontSize: 16,
              }}>+</button>
            </div>
          ))}
        </div>

        <SectionLabel>Objetivo</SectionLabel>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 18 }}>
          {[['definicion', 'Definición'], ['mantenimiento', 'Manten.'], ['volumen', 'Volumen']].map(([id, n]) => (
            <button key={id} onClick={() => setObj(id)} style={{
              padding: '12px 8px', borderRadius: 14,
              background: obj === id ? PALETTE.accent : PALETTE.surface,
              color: obj === id ? PALETTE.on : PALETTE.text2,
              border: obj === id ? 'none' : `0.5px solid ${PALETTE.border}`,
              fontSize: 12.5, fontWeight: 600, cursor: 'pointer',
            }}>{n}</button>
          ))}
        </div>

        <SectionLabel>Tu objetivo diario</SectionLabel>
        <div style={{ ...cardCss, padding: 22, background: PALETTE.accentSoft,
          border: `0.5px solid ${PALETTE.accentDim}` }}>
          <div style={{ fontSize: 11, color: PALETTE.accent, marginBottom: 6,
            fontWeight: 600, letterSpacing: 1.4, textTransform: 'uppercase' }}>Calorías</div>
          <div style={{ fontSize: 42, fontWeight: 600, letterSpacing: -1.2, color: PALETTE.text,
            fontVariantNumeric: 'tabular-nums', lineHeight: 1, marginBottom: 16 }}>{cal} <span style={{
              fontSize: 16, color: PALETTE.text3 }}>kcal</span></div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
            {[['Prot', prot], ['Carbos', carb], ['Grasas', grasa]].map(([l, v]) => (
              <div key={l} style={{ background: PALETTE.surface, padding: 12, borderRadius: 12 }}>
                <div style={{ fontSize: 10, color: PALETTE.text3, fontWeight: 600,
                  letterSpacing: 1, textTransform: 'uppercase', marginBottom: 4 }}>{l}</div>
                <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: -0.4,
                  color: PALETTE.text, fontVariantNumeric: 'tabular-nums' }}>{v}<span style={{
                    fontSize: 11, color: PALETTE.text3 }}>g</span></div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 14, fontSize: 12, color: PALETTE.text2, lineHeight: 1.5 }}>
            TDEE estimado: <strong style={{ color: PALETTE.text }}>{tdee} kcal</strong> · Mifflin-St Jeor con factor 1.55 (activo)
          </div>
        </div>
      </div>
    </div>
  );
}

window.NutricionScreen = NutricionScreen;

// app.jsx — Núcleo: shell, navegación y tweaks

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "denso": false,
  "homeStyle": "voz-protagonista"
}/*EDITMODE-END*/;

// Tab bar minimalista — sin botón central (la voz vive en la Dynamic Island)
function TabBar({ tab, setTab, isMobile }) {
  const items = [
    { id: 'hoy', n: 'Hoy', icon: 'home' },
    { id: 'agenda', n: 'Agenda', icon: 'cal' },
    { id: 'finanzas', n: 'Dinero', icon: 'money' },
    { id: 'nutricion', n: 'Nutri', icon: 'apple' },
    { id: 'tareas', n: 'Más', icon: 'note' },
  ];

  return (
    <div style={{
      position: isMobile ? 'fixed' : 'absolute',
      bottom: 0, left: 0, right: 0,
      paddingBottom: isMobile ? 'calc(env(safe-area-inset-bottom, 16px) + 10px)' : 28,
      paddingTop: 14, paddingLeft: 14, paddingRight: 14,
      background: 'linear-gradient(to top, #000 70%, rgba(0,0,0,0))',
      zIndex: 30,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-around',
        background: 'rgba(255,255,255,0.025)',
        backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)',
        border: `0.5px solid ${PALETTE.border}`, borderRadius: 28, padding: '6px 4px',
        height: 56,
      }}>
        {items.map(t => {
          const active = tab === t.id;
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
              padding: '4px 8px', color: active ? PALETTE.text : PALETTE.text3,
            }}>
              <Icon name={t.icon} size={19} sw={active ? 1.6 : 1.2}/>
              <div style={{ fontSize: 9, fontWeight: 300, letterSpacing: 0.6,
                textTransform: 'uppercase' }}>{t.n}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// Toast — feedback de "guardado en X"
// ─────────────────────────────────────────────────────────
function Toast({ example, onDone }) {
  React.useEffect(() => {
    const id = setTimeout(onDone, 3200);
    return () => clearTimeout(id);
  }, []);
  return (
    <div style={{
      position: 'absolute', top: 58, left: 16, right: 16,
      background: 'rgba(0,0,0,0.92)',
      backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)',
      border: `0.5px solid ${PALETTE.borderStrong}`,
      borderRadius: 18, padding: '12px 14px',
      display: 'flex', gap: 12, alignItems: 'center', zIndex: 90,
      animation: 'toastIn 0.35s cubic-bezier(.4,.0,.2,1)',
      boxShadow: '0 0 30px rgba(255,255,255,0.08), 0 8px 24px rgba(0,0,0,0.6)',
    }}>
      <style>{`@keyframes toastIn { from { transform: translateY(-30px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }`}</style>
      <div style={{
        width: 32, height: 32, borderRadius: 10, flexShrink: 0,
        background: 'transparent', color: PALETTE.text,
        border: `0.5px solid ${PALETTE.borderStrong}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <Icon name="check2" size={14} sw={1.4}/>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12.5, color: PALETTE.text, fontWeight: 400, letterSpacing: -0.05 }}>
          Guardado en {example.destino}
        </div>
        <div style={{ fontSize: 11, color: PALETTE.text3, marginTop: 2, fontWeight: 300, fontStyle: 'italic' }}>
          {example.coach}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// App raíz
// ─────────────────────────────────────────────────────────
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

const SLIDES = [
  { key: 'hoy',       label: 'Hoy' },
  { key: 'agenda',    label: 'Agenda' },
  { key: 'finanzas',  label: 'Dinero' },
  { key: 'nutricion', label: 'Nutri' },
  { key: 'habitos',   label: 'Hábitos' },
  { key: 'notas',     label: 'Notas' },
  { key: 'metas',     label: 'Metas' },
  { key: 'diario',    label: 'Diario' },
  { key: 'tareas',    label: 'Tareas' },
];
const SLIDE_IDX = Object.fromEntries(SLIDES.map((s, i) => [s.key, i]));

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState('hoy');
  const [welcome, setWelcome] = React.useState(true);
  const [voiceOpen, setVoiceOpen] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [slideIdx, setSlideIdx] = React.useState(0);
  const [cameraOpen, setCameraOpen] = React.useState(false);
  const carouselRef = React.useRef(null);

  const openVoice = () => { setWelcome(false); setVoiceOpen(true); };
  const closeVoice = () => { setVoiceOpen(false); };
  const onSaved = (example) => { setVoiceOpen(false); setToast(example); };
  const skipWelcome = () => setWelcome(false);
  const showWelcomeAgain = () => setWelcome(true);

  const goToSlide = React.useCallback((idx) => {
    setSlideIdx(idx);
    if (carouselRef.current) {
      carouselRef.current.scrollTo({ left: idx * carouselRef.current.offsetWidth, behavior: 'smooth' });
    }
  }, []);

  const onCarouselScroll = React.useCallback(() => {
    if (!carouselRef.current) return;
    const idx = Math.round(carouselRef.current.scrollLeft / carouselRef.current.offsetWidth);
    setSlideIdx(idx);
  }, []);

  const goTabMobile = React.useCallback((key) => {
    const i = SLIDE_IDX[key];
    if (i !== undefined) goToSlide(i);
  }, [goToSlide]);

  // screens for desktop
  const screens = {
    hoy: <HoyScreen onVoice={openVoice} goTab={setTab}/>,
    agenda: <AgendaScreen/>,
    tareas: <TareasScreen/>,
    finanzas: <FinanzasScreen/>,
    nutricion: <NutricionScreen onOpenCamera={() => setCameraOpen(true)}/>,
    habitos: <HabitosScreen/>,
    notas: <NotasScreen/>,
    metas: <MetasScreen/>,
    diario: <DiarioScreen/>,
    'voz-log': <NotasScreen/>,
  };

  // ── MOBILE: carrusel horizontal ──────────────────────────
  if (isMobile) {
    const FONT = { fontFamily: '-apple-system, "SF Pro Display", "Inter", system-ui, sans-serif', fontFeatureSettings: '"ss01","cv11"' };
    const topPad = 'calc(env(safe-area-inset-top, 44px) + 58px)';
    const botPad = 'calc(env(safe-area-inset-bottom, 16px) + 52px)';

    return (
      <div style={{ position: 'fixed', inset: 0, background: PALETTE.bg, color: PALETTE.text, ...FONT }}>

        {/* DynamicIsland — fuera del scroll, no se mueve */}
        {!welcome && !voiceOpen && (
          <DynamicIsland onVoice={openVoice} listening={false} isMobile={true}/>
        )}

        {/* Carrusel horizontal */}
        <div
          ref={carouselRef}
          onScroll={onCarouselScroll}
          style={{
            position: 'absolute', inset: 0,
            overflowX: 'scroll', overflowY: 'hidden',
            display: 'flex',
            scrollSnapType: 'x mandatory',
            WebkitOverflowScrolling: 'touch',
            scrollbarWidth: 'none',
            msOverflowStyle: 'none',
          }}
        >
          {SLIDES.map((slide) => {
            // render the screen for this slide
            let content;
            if (slide.key === 'hoy')       content = <HoyScreen onVoice={openVoice} goTab={goTabMobile}/>;
            else if (slide.key === 'agenda')    content = <AgendaScreen/>;
            else if (slide.key === 'finanzas')  content = <FinanzasScreen/>;
            else if (slide.key === 'nutricion') content = <NutricionScreen onOpenCamera={() => setCameraOpen(true)}/>;
            else if (slide.key === 'habitos')   content = <HabitosScreen/>;
            else if (slide.key === 'notas')     content = <NotasScreen/>;
            else if (slide.key === 'metas')     content = <MetasScreen/>;
            else if (slide.key === 'diario')    content = <DiarioScreen/>;
            else if (slide.key === 'tareas')    content = <TareasScreen/>;

            return (
              <div
                key={slide.key}
                style={{
                  minWidth: '100%',
                  height: '100%',
                  overflowY: 'auto',
                  overflowX: 'hidden',
                  scrollSnapAlign: 'start',
                  paddingTop: topPad,
                  paddingBottom: botPad,
                  boxSizing: 'border-box',
                  WebkitOverflowScrolling: 'touch',
                }}
              >
                {content}
              </div>
            );
          })}
        </div>

        {/* Indicador de sección — etiqueta + puntos */}
        {!welcome && (
          <div style={{
            position: 'fixed', bottom: 0, left: 0, right: 0,
            paddingBottom: 'env(safe-area-inset-bottom, 8px)',
            paddingTop: 10,
            background: 'linear-gradient(transparent, rgba(0,0,0,0.85) 40%)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
            zIndex: 60, pointerEvents: 'none',
          }}>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase' }}>
              {SLIDES[slideIdx]?.label}
            </div>
            <div style={{ display: 'flex', gap: 5, pointerEvents: 'auto', paddingBottom: 6 }}>
              {SLIDES.map((s, i) => (
                <div
                  key={s.key}
                  onClick={() => goToSlide(i)}
                  style={{
                    width: i === slideIdx ? 18 : 5,
                    height: 5,
                    borderRadius: 3,
                    background: i === slideIdx ? '#fff' : 'rgba(255,255,255,0.28)',
                    transition: 'all 0.25s ease',
                    cursor: 'pointer',
                  }}
                />
              ))}
            </div>
          </div>
        )}

        {/* Overlays — fuera del carrusel */}
        {toast && <Toast example={toast} onDone={() => setToast(null)}/>}
        {welcome && <WelcomeScreen onVoice={openVoice} onSkip={skipWelcome}/>}
        {voiceOpen && <VoiceModal onClose={closeVoice} onSaved={onSaved}/>}
        {cameraOpen && <CamaraNutricion onBack={() => setCameraOpen(false)}/>}
      </div>
    );
  }

  // ── DESKTOP: simulador iOS ───────────────────────────────
  const inner = (
    <div style={{
      height: '100%', overflowY: 'auto', overflowX: 'hidden',
      background: PALETTE.bg, color: PALETTE.text,
      fontFamily: '-apple-system, "SF Pro Display", "Inter", system-ui, sans-serif',
      fontFeatureSettings: '"ss01", "cv11"',
      position: 'relative',
    }}>
      <div style={{ height: 54 }}/>
      {screens[tab] || screens.hoy}
      {toast && <Toast example={toast} onDone={() => setToast(null)}/>}
      {welcome && <WelcomeScreen onVoice={openVoice} onSkip={skipWelcome}/>}
      {!welcome && !voiceOpen && <DynamicIsland onVoice={openVoice} listening={false} isMobile={false}/>}
      {voiceOpen && <VoiceModal onClose={closeVoice} onSaved={onSaved}/>}
      {cameraOpen && <CamaraNutricion onBack={() => setCameraOpen(false)}/>}
      {!welcome && <TabBar tab={tab} setTab={setTab} isMobile={false}/>}
    </div>
  );

  return (
    <>
      <IOSDevice dark>
        {inner}
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Probar asistente">
          <div style={{ fontSize: 11, color: 'rgba(0,0,0,0.55)', marginBottom: 8, lineHeight: 1.5 }}>
            Cada apertura muestra un ejemplo distinto.
          </div>
          <TweakButton onClick={openVoice}>Abrir asistente de voz</TweakButton>
          <TweakButton onClick={showWelcomeAgain}>Ver pantalla de bienvenida</TweakButton>
        </TweakSection>
        <TweakSection title="Ir a módulo">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            <TweakButton onClick={() => setTab('hoy')}>Hoy</TweakButton>
            <TweakButton onClick={() => setTab('agenda')}>Agenda</TweakButton>
            <TweakButton onClick={() => setTab('tareas')}>Tareas</TweakButton>
            <TweakButton onClick={() => setTab('finanzas')}>Finanzas</TweakButton>
            <TweakButton onClick={() => setTab('nutricion')}>Nutrición</TweakButton>
            <TweakButton onClick={() => setTab('habitos')}>Hábitos</TweakButton>
            <TweakButton onClick={() => setTab('notas')}>Notas</TweakButton>
            <TweakButton onClick={() => setTab('metas')}>Metas</TweakButton>
            <TweakButton onClick={() => setTab('diario')}>Diario</TweakButton>
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
