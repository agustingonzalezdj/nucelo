<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Persistencia en localStorage
function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function saveLS(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    window.dispatchEvent(new CustomEvent('nucleo-ls', { detail: { key } }));
  } catch {}
}

function useLS(key, fallback) {
  const [val, setVal] = React.useState(() => loadLS(key, fallback));
  React.useEffect(() => {
    const handler = (e) => { if (e.detail.key === key) setVal(loadLS(key, fallback)); };
    window.addEventListener('nucleo-ls', handler);
    return () => window.removeEventListener('nucleo-ls', handler);
  }, [key]);
  return val;
}

// ── Categorización inteligente de voz ───────────────────────────────────────
function categorizarTranscript(text) {
  const t = text.toLowerCase();

  // Ingreso DJ / cobro
  if (/cobr[eé]|me pag[oó]|me deposit|ingres[oó]|me transfer/.test(t)) {
    const monto = (t.match(/(\d[\d.,]+)\s*(mil|pesos|peso|k\b)?/) || [])[0];
    return { tipo: 'Ingreso', icon: 'money', destino: 'Finanzas · Ingresos DJ',
      extra: monto ? `+${monto} · hoy` : 'Registrado hoy',
      coach: 'Bien. Una menos en pendientes.' };
  }
  // Gasto
  if (/gast[eé]|compr[eé]|pagu[eé]|cost[oó]|salió|desembolsé/.test(t)) {
    // Normalizar espacios entre dígitos (dictado iOS: "46 000" → "46000")
    const tNorm = t.replace(/(\d)\s+(\d)/g, '$1$2');
    const montoMatch = tNorm.match(/\$?\s*(\d[\d.,]*)\s*(mil|k\b)?/);
    let monto = 0;
    if (montoMatch) {
      monto = parseFloat(montoMatch[1].replace(/\./g, '').replace(',', '.'));
      if (/mil|k\b/.test(montoMatch[2] || '')) monto *= 1000;
    }
    const cats = { super: 'Comida', supermercado: 'Comida', combustible: 'Combustible',
      nafta: 'Combustible', café: 'Cafés', farmacia: 'Salud', ropa: 'Ropa', comida: 'Comida' };
    const cat = Object.entries(cats).find(([k]) => t.includes(k))?.[1] || 'Variable';
    // Detectar fuente de pago
    const fuente = /banco|galicia|transfer|débito|debito|cuenta/.test(t) ? 'banco' : 'efectivo';
    // Guardar en gastos variables y descontar del patrimonio
    if (monto > 0) {
      const fecha = new Date().toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
      const existing = loadLS('nucleo_gastos_var', []);
      saveLS('nucleo_gastos_var', [{ c: text, cat, m: monto, fecha, fuente }, ...existing]);
      descontarPatrimonio(monto, fuente);
    }
    const fuenteLabel = fuente === 'banco' ? 'Banco Galicia' : 'Efectivo';
    return { tipo: 'Gasto', icon: 'money', destino: `Gastos · ${cat}`,
      extra: monto > 0 ? `−${fmt(monto)} de ${fuenteLabel}` : 'Sin monto detectado — agregalo manualmente',
      coach: 'Anotado en tus gastos variables.' };
  }
  // Pago futuro / recordatorio de pago
  if (/pagar|vence|vencimiento|cuota|seguro|factura/.test(t)) {
    return { tipo: 'Pago pendiente', icon: 'money', destino: 'Suscripciones · Próximos pagos',
      extra: 'Recordatorio activado',
      coach: 'Anotado. Te aviso un día antes.' };
  }
  // Agenda / horario
  if (/ma[ñn]ana|lunes|martes|miércoles|jueves|viernes|sábado|domingo|a las|reunión|llamada|evento|boda|XV|cumpleaños/.test(t)) {
    const hora = (t.match(/a las (\d{1,2}(?::\d{2})?)/i) || [])[1];
    return { tipo: 'Agenda', icon: 'cal', destino: `Agenda · ${hora ? hora + 'hs' : 'próximo evento'}`,
      extra: hora ? `Bloque programado a las ${hora}` : 'Agregado a la agenda',
      coach: 'Listo. En la agenda.' };
  }
  // Gym / hábito físico
  if (/gym|gimnasio|entrén[eé]|entreno|cardio|piernas|pecho|espalda|brazos|abdominales|corr[ií]/.test(t)) {
    return { tipo: 'Hábito · Gym', icon: 'dumbbell', destino: 'Hábitos · Gym',
      extra: 'Suma a tu racha · hoy',
      coach: 'Modo bestia activado. Racha suma.' };
  }
  // Nutrición / comida
  if (/com[ií]|desayu[né]|almorzc[eé]|cen[eé]|kcal|proteína|calorías|macro/.test(t)) {
    return { tipo: 'Nutrición', icon: 'apple', destino: 'Nutrición · Comidas del día',
      extra: 'Sumado al registro · calculá macros con foto',
      coach: 'Sumado al día. Vas firme.' };
  }
  // Nota / idea
  if (/idea|anotar|anoto|nota|reel|contenido|publicar|post|story|video|set|tracklist|mix/.test(t)) {
    const tags = [];
    if (/reel|contenido|story|post|video/.test(t)) tags.push('Contenido');
    if (/set|tracklist|mix|dj|música/.test(t)) tags.push('DJ');
    return { tipo: 'Idea · Nota', icon: 'note', destino: `Notas · ${tags[0] || 'General'}`,
      extra: `Tag: ${tags.join(', ') || 'Sin etiqueta'}`,
      coach: 'Buena. La sumo a tu pila.' };
  }
  // Tarea genérica
  if (/tengo que|hay que|recordar|pendiente|hacer|llamar|enviar|mandar|confirmar/.test(t)) {
    return { tipo: 'Tarea', icon: 'check', destino: 'Tareas · Pendientes',
      extra: 'Prioridad media · hoy',
      coach: 'Listo. Una menos en la cabeza.' };
  }
  // Meta / objetivo
  if (/meta|objetivo|quiero|lograr|llegar|bajar|subir|ahorrar/.test(t)) {
    return { tipo: 'Meta', icon: 'target', destino: 'Metas · Activas',
      extra: 'Registrada',
      coach: 'Meta anotada. Foco.' };
  }
  // Diario / reflexión
  if (/hoy fue|me siento|estoy|me alegra|me preocupa|reflexión|diario/.test(t)) {
    return { tipo: 'Diario', icon: 'journal', destino: 'Diario · Entrada de hoy',
      extra: 'Guardado en tu diario',
      coach: 'Escrito. El día queda.' };
  }
  // Fallback
  return { tipo: 'Captura', icon: 'sparkle', destino: 'Notas · General',
    extra: 'Categorizalo vos después',
    coach: 'Guardado. Nada se pierde.' };
}

function VoiceModal({ onClose, onSaved }) {

    setTimeout(() => { if (textareaRef.current) textareaRef.current.focus(); }, 100);
  }, []);

    if (stage !== 'done' || !result) return;
    const id = setTimeout(() => onSaved && onSaved({ ...result, text }), 2000);
    return () => clearTimeout(id);
  }, [stage, result]);

  // Parsear gastos del texto
  const parsearGastos = (textCompleto) => {
    const lineas = textCompleto.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').map(l => l.trim()).filter(Boolean);

      const montoMatch = lNorm.match(/\$?\s*(\d[\d.,]*)\s*(mil|k\b)?/);
      if (!montoMatch) return;
      let monto = parseFloat(montoMatch[1].replace(/\./g, '').replace(',', '.'));
      if (/mil|k\b/.test(montoMatch[2] || '')) monto *= 1000;
      if (!monto || monto <= 0) return;
      const cats = { super: 'Comida', supermercado: 'Comida', combustible: 'Combustible', nafta: 'Combustible', café: 'Cafés', farmacia: 'Salud', ropa: 'Ropa', comida: 'Comida' };
      const cat = Object.entries(cats).find(([k]) => lt.includes(k))?.[1] || 'Variable';
      items.push({ c: linea, cat, m: monto });
    });
    return items;
  };

  const esGasto = (t) => /gast[eé]|compr[eé]|pagu[eé]|cost[oó]|salió|desembolsé|\$\s*\d|\d+\s*(pesos|ars)/i.test(t);

  const enviar = () => {
    if (!text.trim()) return;
    const textCompleto = text.trim();
    const items = parsearGastos(textCompleto);
    const total = items.reduce((s, g) => s + g.m, 0);

    // Si detecta gastos con montos → preguntar fuente
    if (items.length > 0 && total > 0) {
      setGastosPendientes({ items, total });
      setStage('fuente');
      return;
    }

    // Si no hay gastos con montos → categorizar directo
    setStage('analyzing');
    setTimeout(() => {
      setResult(categorizarTranscript(textCompleto));
      setStage('done');
    }, 700);
  };

  const confirmarFuente = (fuente) => {
    setStage('analyzing');
    const { items, total } = gastosPendientes;
    const fecha = new Date().toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    const existing = loadLS('nucleo_gastos_var', []);
    const nuevos = items.map(g => ({ ...g, fecha, fuente }));
    saveLS('nucleo_gastos_var', [...nuevos, ...existing]);
    descontarPatrimonio(total, fuente);
    const fuenteLabel = fuente === 'banco' ? 'Banco Galicia' : 'Efectivo';
    setTimeout(() => {
      setResult({ tipo: items.length > 1 ? 'Gastos múltiples' : 'Gasto', icon: 'money',
        destino: items.length > 1 ? `${items.length} gastos registrados` : `Gastos · ${items[0].cat}`,
        extra: `−${fmt(total)} de ${fuenteLabel}`,
        coach: items.length > 1 ? `${items.length} movimientos anotados.` : 'Anotado y descontado.' });
      setStage('done');
    }, 400);
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: '#000', zIndex: 90,
      display: 'flex', flexDirection: 'column',
      fontFamily: '-apple-system, "SF Pro Display", system-ui, sans-serif',

      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',

        borderBottom: `0.5px solid ${PALETTE.border}`,
      }}>
        <div style={{ fontSize: 11, fontWeight: 400, letterSpacing: 2, textTransform: 'uppercase', color: PALETTE.text3 }}>
          {stage === 'input' && 'Escribí o dictá'}
          {stage === 'fuente' && '¿Con qué pagaste?'}
          {stage === 'analyzing' && 'Analizando...'}
          {stage === 'done' && 'Guardado'}
        </div>
        <button onClick={onClose} style={{
          width: 30, height: 30, borderRadius: 15, background: 'transparent',
          border: `0.5px solid ${PALETTE.borderStrong}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: PALETTE.text, cursor: 'pointer',
        }}>
          <Icon name="x" size={13} sw={1.4}/>
        </button>
      </div>

      {/* Body */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '24px 20px 20px', gap: 20, overflowY: 'auto' }}>

        {stage === 'input' && (

              placeholder={'una idea · un gasto · una tarea\n\nEj: "Pagué 5000 pesos de nafta"\nEj: "Llamar al médico mañana"\n\nPodés tocar el 🎤 del teclado para dictarlo'}
              style={{

                letterSpacing: -0.2, resize: 'none', fontFamily: 'inherit',
                caretColor: '#fff',
              }}
            />
            <button
              onClick={enviar}

              style={{

function HabitosScreen() {
  const [habitos, setHabitos] = React.useState(() => loadLS('nucleo_habitos', []));
  const [addOpen, setAddOpen] = React.useState(false);
  const [nombre, setNombre] = React.useState('');

  const toggle = (i) => {
    const updated = habitos.map((h, j) => i === j ? { ...h, hechoHoy: !h.hechoHoy, streak: !h.hechoHoy ? h.streak + 1 : Math.max(0, h.streak - 1) } : h);
    setHabitos(updated); saveLS('nucleo_habitos', updated);
  };
  const addHabito = () => {
    if (!nombre.trim()) return;
    const updated = [...habitos, { n: nombre.trim(), icon: 'flame', streak: 0, hechoHoy: false }];
    setHabitos(updated); saveLS('nucleo_habitos', updated); setNombre(''); setAddOpen(false);
  };
  const borrar = (i) => {
    const updated = habitos.filter((_, j) => j !== i);
    setHabitos(updated); saveLS('nucleo_habitos', updated);
  };

  const hechos = habitos.filter(h => h.hechoHoy).length;
  const maxStreak = habitos.length ? Math.max(...habitos.map(h => h.streak)) : 0;
  const mejorHabito = habitos.find(h => h.streak === maxStreak);

  return (
    <div style={{ paddingTop: 8, paddingBottom: 130 }}>
      <ScreenHeader
        title="Hábitos"
        sub={habitos.length > 0 ? `${hechos}/${habitos.length} hoy` : 'Sin hábitos'}
        action={<IconButton icon="plus" accent onClick={() => setAddOpen(true)}/>}
      />

      {maxStreak > 0 && (
        <div style={{ padding: '0 22px 22px' }}>
          <div style={{ ...cardCss, padding: 22 }}>
            <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: 1.6, textTransform: 'uppercase', color: PALETTE.text3, marginBottom: 6 }}>Racha más larga</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <div style={{ fontSize: 56, fontWeight: 600, letterSpacing: -2, color: PALETTE.accent, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{maxStreak}</div>
              <div style={{ fontSize: 14, color: PALETTE.text2 }}>días · {mejorHabito?.n}</div>
            </div>
          </div>
        </div>
      )}

      {addOpen && (
        <div style={{ padding: '0 16px 16px' }}>
          <div style={{ ...cardCss, padding: 16, display: 'flex', gap: 10 }}>
            <input autoFocus value={nombre} onChange={e => setNombre(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addHabito()}
              placeholder="Nombre del hábito..."
              style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: PALETTE.text, fontSize: 15, fontFamily: 'inherit' }}/>
            <button onClick={addHabito} style={{ background: PALETTE.accent, color: PALETTE.on, border: 'none', borderRadius: 10, padding: '6px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>Agregar</button>
          </div>
        </div>
      )}

      <div style={{ padding: '0 16px' }}>
        <SectionLabel>Hoy</SectionLabel>
        {habitos.length === 0 ? (
          <div style={{ ...cardCss, padding: 32, textAlign: 'center' }}>
            <Icon name="flame" size={32} color={PALETTE.text4} sw={1.2}/>
            <div style={{ fontSize: 14, color: PALETTE.text3, marginTop: 12 }}>Sin hábitos. Tocá + para agregar.</div>
          </div>
        ) : (
          <div style={{ ...cardCss, padding: 0, overflow: 'hidden' }}>
            {habitos.map((h, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', padding: '14px 16px', gap: 12, borderTop: i > 0 ? `0.5px solid ${PALETTE.border}` : 'none' }}>
                <div style={{ width: 36, height: 36, borderRadius: 11, background: h.hechoHoy ? PALETTE.accentSoft : PALETTE.surfaceStrong, color: h.hechoHoy ? PALETTE.accent : PALETTE.text2, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon name="flame" size={18} sw={1.6}/>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14.5, color: PALETTE.text, fontWeight: 500 }}>{h.n}</div>
                  <div style={{ fontSize: 11.5, color: PALETTE.text3, marginTop: 2, display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Icon name="flame" size={11} color={PALETTE.amber} sw={1.6}/>
                    {h.streak} días
                  </div>
                </div>
                <button onClick={() => toggle(i)} style={{ width: 30, height: 30, borderRadius: 15, flexShrink: 0, cursor: 'pointer', border: h.hechoHoy ? 'none' : `1.5px solid ${PALETTE.text4}`, background: h.hechoHoy ? PALETTE.accent : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {h.hechoHoy && <Icon name="check2" size={16} sw={2.6} color={PALETTE.on}/>}
                </button>
                <button onClick={() => borrar(i)} style={{ background: 'none', border: 'none', color: PALETTE.text4, cursor: 'pointer', padding: 4 }}>
                  <Icon name="x" size={14} sw={2}/>
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const PROMPTS = [
  '¿Qué hiciste hoy que tu yo de hace un año no podía hacer?',
  '¿Qué te desafió hoy y cómo lo manejaste?',
  '¿Qué querés lograr mañana?',
  '¿Algo que aprendiste hoy, aunque sea pequeño?',
  '¿Cómo estuvo tu energía hoy?',
];

function DiarioScreen() {
  const [entradas, setEntradas] = React.useState(() => loadLS('nucleo_diario', []));
  const [texto, setTexto] = React.useState('');
  const [escribiendo, setEscribiendo] = React.useState(false);
  const prompt = PROMPTS[new Date().getDay() % PROMPTS.length];

  const guardar = () => {
    if (!texto.trim()) return;
    const now = new Date();
    const fecha = now.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short' });
    const updated = [{ fecha, preview: texto.trim(), mood: '📝' }, ...entradas];
    setEntradas(updated); saveLS('nucleo_diario', updated); setTexto(''); setEscribiendo(false);
  };

  return (
    <div style={{ paddingTop: 8, paddingBottom: 130 }}>
      <ScreenHeader title="Diario"
        sub={entradas.length > 0 ? `${entradas.length} entrada${entradas.length !== 1 ? 's' : ''}` : 'Sin entradas'}
        action={<IconButton icon="plus" accent onClick={() => setEscribiendo(true)}/>}/>

      <div style={{ padding: '0 16px 18px' }}>
        <div style={{ ...cardCss, background: PALETTE.accentSoft, border: `0.5px solid ${PALETTE.accentDim}` }}>
          <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: 1.6, textTransform: 'uppercase', color: PALETTE.accent, marginBottom: 8 }}>Pregunta del día</div>
          <div style={{ fontSize: 17, color: PALETTE.text, fontWeight: 500, letterSpacing: -0.3, lineHeight: 1.35, marginBottom: 14 }}>{prompt}</div>
          {escribiendo ? (
            <>
              <textarea value={texto} onChange={e => setTexto(e.target.value)} rows={4}
                placeholder="Escribí acá..."
                style={{ width: '100%', background: 'rgba(255,255,255,0.06)', border: `0.5px solid ${PALETTE.border}`, borderRadius: 12, padding: 12, color: PALETTE.text, fontSize: 14, fontFamily: 'inherit', outline: 'none', resize: 'none', boxSizing: 'border-box', marginBottom: 10 }}/>
              <button onClick={guardar} style={{ background: PALETTE.accent, color: PALETTE.on, border: 'none', padding: '10px 16px', borderRadius: 12, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>Guardar entrada</button>
            </>
          ) : (
            <button onClick={() => setEscribiendo(true)} style={{ background: PALETTE.accent, color: PALETTE.on, border: 'none', padding: '10px 16px', borderRadius: 12, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>Responder</button>
          )}
        </div>
      </div>

      <div style={{ padding: '0 16px' }}>
        <SectionLabel>Entradas recientes</SectionLabel>
        {entradas.length === 0 ? (
          <div style={{ ...cardCss, padding: 24, textAlign: 'center' }}>
            <div style={{ fontSize: 13, color: PALETTE.text3 }}>Tu diario está vacío. Respondé la pregunta del día para empezar.</div>
          </div>
        ) : (

function FinGastos() {
  const gastos = useLS('nucleo_gastos_var', []);
  const [addOpen, setAddOpen] = React.useState(false);
  const [form, setForm] = React.useState({ c: '', cat: '', m: '', fuente: 'efectivo' });

  const addGasto = () => {
    if (!form.c.trim() || !form.m) return;
    const now = new Date();
    const fecha = now.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    const nuevo = { c: form.c.trim(), cat: form.cat.trim() || 'General', m: +form.m, fecha, fuente: form.fuente };
    saveLS('nucleo_gastos_var', [nuevo, ...gastos]);
    descontarPatrimonio(+form.m, form.fuente);
    setForm({ c: '', cat: '', m: '', fuente: 'efectivo' });
    setAddOpen(false);
  };
  const borrar = (i) => {
    saveLS('nucleo_gastos_var', gastos.filter((_, j) => j !== i));
  };

  // Calcular totales fijos reales
  const totalFijosARS = DATA.gastosFijosARS.reduce((s, g) => s + g.m, 0);
  const totalVar = gastos.reduce((s, g) => s + g.m, 0);

  return (
    <div>
      {/* Resumen fijos */}
      <div style={{ padding: '0 16px 18px' }}>
        <SectionLabel>Gastos fijos del mes</SectionLabel>
        <div style={{ ...cardCss, padding: 16 }}>
          <div style={{ fontSize: 11, color: PALETTE.text3, marginBottom: 4 }}>Total fijos ARS</div>
          <div style={{ fontSize: 28, fontWeight: 600, color: PALETTE.warn, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.5 }}>{fmt(totalFijosARS)}</div>
        </div>
      </div>

      {/* Variables */}
      <div style={{ padding: '0 16px' }}>
        <SectionLabel action={<button onClick={() => setAddOpen(true)} style={{ background: 'none', border: 'none', color: PALETTE.accent, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>+ Agregar</button>}>
          Gastos variables
        </SectionLabel>

        {addOpen && (
          <div style={{ ...cardCss, padding: 16, marginBottom: 10, display: 'flex', flexDirection: 'column', gap: 10 }}>
            <input autoFocus value={form.c} onChange={e => setForm(f => ({...f, c: e.target.value}))}
              placeholder="Descripción (ej: YPF)"
              style={{ background: 'transparent', border: 'none', outline: 'none', color: PALETTE.text, fontSize: 15, fontFamily: 'inherit' }}/>
            <input value={form.cat} onChange={e => setForm(f => ({...f, cat: e.target.value}))}
              placeholder="Categoría"
              style={{ background: PALETTE.surface, border: `0.5px solid ${PALETTE.border}`, borderRadius: 10, padding: '8px 12px', color: PALETTE.text2, fontSize: 13, fontFamily: 'inherit', outline: 'none' }}/>

            <div style={{ display: 'flex', gap: 8 }}>
              {[{ v: 'efectivo', l: '💵 Efectivo' }, { v: 'banco', l: '🏦 Banco Galicia' }].map(opt => (

function FinIngresos() {
  const fmtMonto = (e) => e.cur === 'USD'
    ? `U$D ${e.total.toLocaleString('es-AR')}`
    : fmt(e.total);
  const fmtPagado = (e) => e.cur === 'USD'
    ? `U$D ${e.pagado.toLocaleString('es-AR')}`
    : fmt(e.pagado);
  const falta = (e) => e.total - e.pagado;
  const fmtFalta = (e) => e.cur === 'USD'
    ? `U$D ${falta(e).toLocaleString('es-AR')}`
    : fmt(falta(e));

  const pendARS = DATA.eventosDJ.filter(e => e.cur === 'ARS' && e.estado !== 'cobrado').reduce((a, e) => a + falta(e), 0);
  const pendUSD = DATA.eventosDJ.filter(e => e.cur === 'USD' && e.estado !== 'cobrado').reduce((a, e) => a + falta(e), 0);
  const cobARS  = DATA.eventosDJ.filter(e => e.cur === 'ARS').reduce((a, e) => a + e.pagado, 0);
  const cobUSD  = DATA.eventosDJ.filter(e => e.cur === 'USD').reduce((a, e) => a + e.pagado, 0);

  const [filtro, setFiltro] = React.useState('todos');
  const visible = DATA.eventosDJ.filter(e => {
    if (filtro === 'pendiente') return e.estado !== 'cobrado';
    if (filtro === 'cobrado') return e.estado === 'cobrado';
    return true;
  });

  return (
    <div>
      {/* Resumen */}
      <div style={{ padding: '0 16px 18px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <div style={{ ...cardCss, padding: 16 }}>
          <div style={{ fontSize: 10, color: PALETTE.text3, fontWeight: 600, letterSpacing: 1.2, textTransform: 'uppercase', marginBottom: 6 }}>Por cobrar</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: PALETTE.warn, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3 }}>{fmt(pendARS)}</div>
          {pendUSD > 0 && <div style={{ fontSize: 12, color: PALETTE.cool, marginTop: 2 }}>+ U$D {pendUSD.toLocaleString('es-AR')}</div>}
        </div>
        <div style={{ ...cardCss, padding: 16 }}>
          <div style={{ fontSize: 10, color: PALETTE.text3, fontWeight: 600, letterSpacing: 1.2, textTransform: 'uppercase', marginBottom: 6 }}>Cobrado total</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: PALETTE.accent, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3 }}>{fmt(cobARS)}</div>
          {cobUSD > 0 && <div style={{ fontSize: 12, color: PALETTE.cool, marginTop: 2 }}>+ U$D {cobUSD.toLocaleString('es-AR')}</div>}
        </div>
      </div>

      {/* Filtros */}
      <div style={{ display: 'flex', gap: 6, padding: '0 16px 14px' }}>
        {[['todos','Todos'],['pendiente','Por cobrar'],['cobrado','Cobrados']].map(([id,n]) => (
          <button key={id} onClick={() => setFiltro(id)} style={{
            padding: '6px 12px', borderRadius: 12, fontSize: 12, fontWeight: 600, cursor: 'pointer', border: 'none',
            background: filtro === id ? PALETTE.text : PALETTE.surface,
            color: filtro === id ? PALETTE.bg : PALETTE.text2,
          }}>{n}</button>
        ))}
      </div>

      {/* Lista */}
      <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {visible.map((e, i) => (
          <div key={i} style={{ ...cardCss, padding: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 10.5, color: PALETTE.text3, fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 3 }}>{e.fecha}</div>
                <div style={{ fontSize: 14.5, color: PALETTE.text, fontWeight: 600, lineHeight: 1.2 }}>{e.evento}</div>
                {e.lugar ? <div style={{ fontSize: 11.5, color: PALETTE.text3, marginTop: 2 }}>{e.lugar}</div> : null}

              <div style={{ textAlign: 'right', flexShrink: 0, marginLeft: 12 }}>
                <div style={{ fontSize: 16, color: PALETTE.text, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{fmtMonto(e)}</div>
                {e.estado === 'cobrado' && <Pill bg={PALETTE.accentSoft} color={PALETTE.accent}>✓ Cobrado</Pill>}

                {e.estado === 'pendiente' && <Pill bg={PALETTE.warnSoft} color={PALETTE.warn}>Pendiente</Pill>}
              </div>
            </div>
            {e.estado !== 'cobrado' && (
              <div style={{ display: 'flex', gap: 16, padding: '8px 0 0', borderTop: `0.5px solid ${PALETTE.border}`, fontSize: 12 }}>

                {e.cuotas && <span style={{ color: PALETTE.text3 }}>Cuotas: <span style={{ color: PALETTE.text }}>{e.cuotas}</span></span>}
              </div>
            )}
            {e.contacto && <div style={{ fontSize: 11, color: PALETTE.text3, marginTop: 6 }}>📞 {e.contacto}</div>}
          </div>
        ))}
      </div>
    </div>
  );

function MacroRing({ kcal, obj }) {
  const pct = Math.min(kcal / obj, 1);
  const r = 50;
  const C = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: 130, height: 130, flexShrink: 0 }}>
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle cx="65" cy="65" r={r} fill="none" stroke={PALETTE.surfaceStrong} strokeWidth="10"/>
        <circle cx="65" cy="65" r={r} fill="none" stroke={PALETTE.accent} strokeWidth="10"
          strokeDasharray={`${C * pct} ${C}`} strokeLinecap="round"
          transform="rotate(-90 65 65)"/>
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ fontSize: 26, fontWeight: 600, letterSpacing: -0.6, color: PALETTE.text,
          fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{kcal}</div>
        <div style={{ fontSize: 10, color: PALETTE.text3, marginTop: 2,
          fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase' }}>de {obj}</div>
        <div style={{ fontSize: 10, color: PALETTE.text3, fontWeight: 600,
          letterSpacing: 1, textTransform: 'uppercase' }}>kcal</div>
      </div>
    </div>
  );
}

function MacroRow({ label, v, obj, unit, color }) {
  const pct = Math.min(v / obj, 1);
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5,
        alignItems: 'baseline' }}>
        <div style={{ fontSize: 12, color: PALETTE.text2, fontWeight: 500 }}>{label}</div>
        <div style={{ fontSize: 12, color: PALETTE.text, fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>
          {v}<span style={{ color: PALETTE.text3 }}>/{obj}{unit}</span>
        </div>
      </div>
      <div style={{ height: 4, borderRadius: 2, background: PALETTE.surfaceStrong, overflow: 'hidden' }}>
        <div style={{ width: `${pct * 100}%`, height: '100%', background: color, borderRadius: 2 }}/>
      </div>
    </div>
  );
}

// ─── Cámara: flujo de análisis IA ───
function CamaraNutricion({ onBack }) {
  const [stage, setStage] = React.useState('aim'); // aim | analyzing | result | error | nokey
  const [progress, setProgress] = React.useState(0);
  const [camError, setCamError] = React.useState(false);
  const [detected, setDetected] = React.useState([]);
  const [total, setTotal] = React.useState({ kcal: 0, p: 0, c: 0, g: 0 });
  const [errorMsg, setErrorMsg] = React.useState('');
  const [apiKey, setApiKey] = React.useState(() => localStorage.getItem('nucleo_api_key') || '');
  const [keyInput, setKeyInput] = React.useState('');
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    navigator.mediaDevices?.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
      .then(stream => {
        streamRef.current = stream;
        const v = videoRef.current;
        if (v) {
          v.srcObject = stream;
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.muted = true;
          const p = v.play();
          if (p && p.catch) p.catch(() => {});
        }
      })
      .catch(() => setCamError(true));
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const captureAndAnalyze = async () => {
    const key = apiKey || localStorage.getItem('nucleo_api_key');
    if (!key) { setStage('nokey'); return; }

    setStage('analyzing');
    setProgress(0);

    // Capturar frame del video
    const video = videoRef.current;
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

    // Animación de progreso mientras espera la API
    let p = 0;
    const progInterval = setInterval(() => {
      p = Math.min(p + 2, 88);
      setProgress(p);
    }, 120);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-6',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
              { type: 'text', text: `Analizá esta imagen de comida con precisión. Identificá SOLO lo que realmente ves en la imagen. Para cada alimento visible estimá el peso en gramos y calculá calorías y macros basándote en tablas nutricionales estándar. Respondé ÚNICAMENTE con un JSON válido, sin texto extra, en este formato exacto:
{"alimentos":[{"n":"nombre del alimento","g":"Xg","kcal":X,"p":X,"c":X,"gr":X}],"total":{"kcal":X,"p":X,"c":X,"g":X}}
Donde p=proteínas, c=carbohidratos, gr/g=grasas, todos en gramos enteros. Si no hay comida visible, devolvé {"alimentos":[],"total":{"kcal":0,"p":0,"c":0,"g":0}}.` }
            ]
          }]
        })
      });

      clearInterval(progInterval);
      setProgress(95);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        if (res.status === 401) { setStage('nokey'); setErrorMsg('API key inválida.'); return; }
        throw new Error(err.error?.message || `Error ${res.status}`);
      }

      const data = await res.json();
      const text = data.content[0].text.trim();
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Respuesta inválida de la IA');
      const parsed = JSON.parse(jsonMatch[0]);

      setDetected(parsed.alimentos || []);
      setTotal(parsed.total || { kcal: 0, p: 0, c: 0, g: 0 });
      setProgress(100);
      setTimeout(() => setStage('result'), 300);

    } catch(err) {
      clearInterval(progInterval);
      setErrorMsg(err.message);
      setStage('error');
    }
  };

  const saveKey = () => {
    const k = keyInput.trim();
    if (!k) return;
    localStorage.setItem('nucleo_api_key', k);
    setApiKey(k);
    setKeyInput('');
    setStage('aim');
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: '#000', zIndex: 100,
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      {/* viewfinder */}
      <div style={{
        flex: 1, position: 'relative',
        background: '#000',
        overflow: 'hidden',
      }}>
        {/* top bar */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0,
          padding: '60px 20px 18px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          background: 'linear-gradient(to bottom, rgba(0,0,0,0.7), transparent)',
          zIndex: 5,
        }}>
          <button onClick={onBack} style={{
            width: 36, height: 36, borderRadius: 18, background: 'rgba(255,255,255,0.15)',
            border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', cursor: 'pointer',
          }}>
            <Icon name="x" size={16} sw={2}/>
          </button>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '5px 12px', borderRadius: 12,
            background: 'rgba(0,0,0,0.5)', color: PALETTE.accent,
            fontSize: 11, fontWeight: 700, letterSpacing: 0.8, textTransform: 'uppercase',
            backdropFilter: 'blur(10px)',
          }}>
            <Icon name="sparkle" size={12} sw={2}/>
            Análisis IA
          </div>
          <div style={{ width: 36 }}/>
        </div>

        {/* cámara real */}
        {!camError ? (
          <video ref={videoRef} autoPlay playsInline muted style={{
            position: 'absolute', inset: 0, width: '100%', height: '100%',
            objectFit: 'cover',
          }}/>
        ) : (
          <div style={{
            position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 12,
          }}>
            <Icon name="camera" size={40} color="rgba(255,255,255,0.3)" sw={1}/>
            <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', fontWeight: 300,
              textAlign: 'center', maxWidth: 220 }}>
              Habilitá la cámara en los permisos del navegador para usar esta función
            </div>
          </div>
        )}

        {/* scan line durante análisis */}
        {stage === 'analyzing' && (
          <div style={{
            position: 'absolute', left: 0, right: 0, height: 2, background: PALETTE.accent,
            top: `${progress}%`, boxShadow: `0 0 20px ${PALETTE.accent}`, opacity: 0.8,
            pointerEvents: 'none',
          }}/>
        )}

        {/* aim guide */}
        {stage === 'aim' && (
          <div style={{
            position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
            width: 280, height: 280, borderRadius: 24,
            border: `2px dashed rgba(255,255,255,0.4)`, pointerEvents: 'none',
          }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{

                ...(i === 0 ? { top: -2, left: -2 } : i === 1 ? { top: -2, right: -2 }
                  : i === 2 ? { bottom: -2, left: -2 } : { bottom: -2, right: -2 }),
                width: 24, height: 24,

                borderBottom: i >= 2 ? `3px solid ${PALETTE.accent}` : 'none',
                borderLeft: i % 2 === 0 ? `3px solid ${PALETTE.accent}` : 'none',
                borderRight: i % 2 === 1 ? `3px solid ${PALETTE.accent}` : 'none',
                borderTopLeftRadius: i === 0 ? 8 : 0,

                borderBottomLeftRadius: i === 2 ? 8 : 0,

              }}/>
            ))}
          </div>
        )}

        {stage === 'aim' && (
          <div style={{
            position: 'absolute', bottom: 140, left: 0, right: 0, textAlign: 'center',

          }}>Encuadrá el plato</div>
        )}

        {stage === 'analyzing' && (
          <div style={{
            position: 'absolute', bottom: 140, left: 24, right: 24, textAlign: 'center',
          }}>
            <div style={{ color: PALETTE.accent, fontSize: 13, fontWeight: 700,

            </div>
            <div style={{ height: 3, background: 'rgba(255,255,255,0.15)', borderRadius: 2, overflow: 'hidden' }}>

        {/* shutter */}
        {stage === 'aim' && (

      {stage === 'nokey' && (

          position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.92)',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          justifyContent: 'center', padding: '32px 28px', zIndex: 20,

          <div style={{ fontSize: 13, color: PALETTE.text3, fontWeight: 300, textAlign: 'center',
            marginBottom: 24, lineHeight: 1.5 }}>

          </div>
          {errorMsg ? <div style={{ fontSize: 12, color: '#ff6b6b', marginBottom: 12,
            textAlign: 'center' }}>{errorMsg}</div> : null}
          <input
            type="text"
            placeholder="sk-ant-..."

            style={{
